<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Client | Download</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .download-container {
            padding: 160px 20px 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-top: 60px;
            width: 100%;
            justify-content: center;
        }

        .download-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 60px 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .download-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.03);
        }

        /* --- THE LOGO STYLE ARCHITECTURE (ANTI-DISTORTION) --- */
        .logo-box {
            width: 90px;
            height: 90px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Strict rules to completely prevent image stretching */
        .os-logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps original proportions perfectly */
            aspect-ratio: 1 / 1; /* Hard locks the dimensions to a perfect square */
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3));
            transition: all 0.4s ease;
        }

        /* Micro-interactions on Card Hover */
        .download-card:hover .os-logo-img {
            transform: scale(1.08);
            filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.4)) brightness(1.05);
        }

        /* Hover Glow Borders matching the native OS colors */
        .download-card.win-card:hover { border-color: rgba(59, 130, 246, 0.3); }
        .download-card.mac-card:hover { border-color: rgba(255, 255, 255, 0.2); }
        .download-card.linux-card:hover { border-color: rgba(250, 204, 21, 0.3); }

        .download-card h3 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .os-specs {
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 40px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .status-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.4);
            padding: 14px 40px;
            border-radius: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: not-allowed;
            font-size: 13px;
            transition: all 0.4s ease;
        }

        .download-card:hover .status-btn {
            color: white;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <nav class="glass-nav">
        <a href="index.html" class="logo">MIDNIGHT<span>CLIENT</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="features.html">Features</a></li>
            <li><a href="#">Store</a></li>
            <li><a href="#">Support</a></li>
        </ul>
        <a href="download.html" class="glass-btn small-btn">Download</a>
    </nav>

    <section class="download-container">
        <div class="features-header">
            <h2>GET <span>MIDNIGHT</span></h2>
            <p>High-performance builds for every environment.</p>
        </div>

        <div class="download-grid">
            
            <div class="download-card win-card">
                <div class="logo-box">
                    <img src="windows.png" alt="Windows" class="os-logo-img">
                </div>
                <h3>Windows</h3>
                <p class="os-specs">Windows 10 / 11</p>
                <div class="status-btn">Coming Soon</div>
            </div>

            <div class="download-card mac-card">
                <div class="logo-box">
                    <img src="macos.png" alt="macOS" class="os-logo-img">
                </div>
                <h3>macOS</h3>
                <p class="os-specs">M1 / M2 / Intel</p>
                <div class="status-btn">Coming Soon</div>
            </div>

            <div class="download-card linux-card">
                <div class="logo-box">
                    <img src="linux.png" alt="Linux" class="os-logo-img">
                </div>
                <h3>Linux</h3>
                <p class="os-specs">Universal AppImage</p>
                <div class="status-btn">Coming Soon</div>
            </div>

        </div>
    </section>

</body>
</html>
