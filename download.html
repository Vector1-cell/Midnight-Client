    <style>
        .download-container {
            padding: 160px 20px 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-top: 60px;
            width: 100%;
            justify-content: center;
        }

        .download-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 60px 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .download-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.03);
        }

        /* --- THE LOGO STYLE ARCHITECTURE (ANTI-DISTORTION) --- */
        .logo-box {
            width: 100px;
            height: 100px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Windows 11 Frosted Glass Native Four-Color Grid */
        .windows-glass-logo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            width: 80px;
            height: 80px;
        }

        .win-tile {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        /* Original Microsoft Branding Color Palette (Frosted) */
        .win-tile.tl { background: rgba(242, 80, 34, 0.45); border-top-left-radius: 14px; }     /* Red-Orange */
        .win-tile.tr { background: rgba(127, 186, 0, 0.45); border-top-right-radius: 14px; }    /* Green */
        .win-tile.bl { background: rgba(0, 164, 239, 0.45); border-bottom-left-radius: 14px; }   /* Blue */
        .win-tile.br { background: rgba(255, 185, 0, 0.45); border-bottom-right-radius: 14px; }  /* Yellow */

        /* macOS Premium Frosted Acrylic Tile */
        .mac-glass-tile {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        /* Pure Absolute Fixed Sizing for Mac Graphic */
        .mac-glass-tile svg {
            width: 44px;
            height: 44px;
            fill: rgba(255, 255, 255, 0.85);
            flex-shrink: 0;
        }

        /* Linux Frosted Gold/Dark Glass Tile */
        .linux-glass-tile {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            background: rgba(255, 214, 10, 0.15); /* Tinted with Linux gold */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 214, 10, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        /* Absolute Sizing + Hard Grid constraints to stop Tux distortion */
        .linux-glass-tile svg {
            width: 46px;
            height: 46px;
            flex-shrink: 0;
        }

        /* Hover Glow Effects using respective Brand Colors */
        .download-card:nth-child(1):hover { border-color: rgba(0, 164, 239, 0.4); }
        .download-card:nth-child(2):hover { border-color: rgba(255, 255, 255, 0.3); }
        .download-card:nth-child(3):hover { border-color: rgba(255, 214, 10, 0.4); }

        .download-card:hover .win-tile { filter: brightness(1.15); }
        .download-card:hover .mac-glass-tile { background: rgba(255, 255, 255, 0.18); }
        .download-card:hover .linux-glass-tile { background: rgba(255, 214, 10, 0.25); }

        .download-card h3 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .os-specs {
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 40px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .status-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.4);
            padding: 14px 40px;
            border-radius: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: not-allowed;
            font-size: 13px;
            transition: all 0.4s ease;
        }

        .download-card:hover .status-btn {
            color: white;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
