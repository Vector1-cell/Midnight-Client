<head>

    <style>
        .download-container {
            padding: 160px 20px 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-top: 60px;
            width: 100%;
            justify-content: center;
        }

        .download-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 60px 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .download-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(168, 85, 247, 0.4);
        }

        /* --- THE LOGO STYLE ARCHITECTURE --- */
        .logo-box {
            width: 100px;
            height: 100px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Pure CSS Frosted Windows 11 Logo Layout */
        .windows-glass-logo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            width: 80px;
            height: 80px;
        }

        .win-tile {
            background: linear-gradient(135deg, rgba(216, 180, 254, 0.45), rgba(59, 130, 246, 0.45));
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.4s ease;
        }

        /* Explicit corner radii mimicking Windows 11 */
        .win-tile:nth-child(1) { border-top-left-radius: 14px; }
        .win-tile:nth-child(2) { border-top-right-radius: 14px; }
        .win-tile:nth-child(3) { border-bottom-left-radius: 14px; }
        .win-tile:nth-child(4) { border-bottom-right-radius: 14px; }

        /* Unified Frosted Glass Tile for macOS and Linux */
        .os-glass-tile {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(216, 180, 254, 0.45), rgba(59, 130, 246, 0.45));
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.4s ease;
        }

        /* Absolute anti-distortion layout fixes */
        .os-glass-tile svg {
            width: 42px;
            height: 42px;
            aspect-ratio: 1 / 1; /* Hard lock to prevent horizontal/vertical stretching */
            fill: rgba(255, 255, 255, 0.9);
            flex-shrink: 0;
            display: block;
        }

        /* Micro-interactions on Card Hover */
        .download-card:hover .win-tile,
        .download-card:hover .os-glass-tile {
            background: linear-gradient(135deg, rgba(216, 180, 254, 0.65), rgba(94, 92, 230, 0.65));
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
            transform: scale(1.03);
        }

        .download-card h3 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .os-specs {
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 40px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .status-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.4);
            padding: 14px 40px;
            border-radius: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: not-allowed;
            font-size: 13px;
            transition: all 0.4s ease;
        }

        .download-card:hover .status-btn {
            color: white;
            background: rgba(168, 85, 247, 0.2);
            border-color: rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.1);
        }
    </style>
</head>
