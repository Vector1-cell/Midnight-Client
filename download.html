    <style>
        .download-container {
            padding: 160px 20px 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-top: 60px;
            width: 100%;
            justify-content: center;
        }

        .download-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 60px 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .download-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(168, 85, 247, 0.4); /* Purple glow border */
        }

        /* --- THE LOGO STYLE --- */
        .logo-box {
            width: 100px;
            height: 100px;
            margin-bottom: 30px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Windows Quad-Tile Style */
        .windows-logo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            width: 80px;
            height: 80px;
        }

        .tile {
            background: linear-gradient(135deg, #c084fc, #3b82f6); /* Purple to Blue Gradient */
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Specific corner rounding for the Win11 look */
        .tile:nth-child(1) { border-top-left-radius: 12px; }
        .tile:nth-child(2) { border-top-right-radius: 12px; }
        .tile:nth-child(3) { border-bottom-left-radius: 12px; }
        .tile:nth-child(4) { border-bottom-right-radius: 12px; }

        /* MacOS & Linux Icon Container */
        .glass-icon-tile {
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, #c084fc, #3b82f6);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .glass-icon-tile svg {
            width: 45px;
            height: 45px;
            fill: white;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        /* Hover animation for logos */
        .download-card:hover .tile,
        .download-card:hover .glass-icon-tile {
            filter: brightness(1.1) saturate(1.2);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
        }

        .download-card h3 {
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        .os-specs {
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 40px;
            font-weight: 500;
        }

        .status-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            padding: 15px 40px;
            border-radius: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: not-allowed;
        }

        .download-card:hover .status-btn {
            color: white;
            background: rgba(168, 85, 247, 0.2);
            border-color: rgba(168, 85, 247, 0.5);
        }
    </style>
</head>
