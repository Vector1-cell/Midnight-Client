    <style>
        /* --- Page Layout & Centering --- */
        .download-container {
            padding: 160px 20px 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 60px;
            width: 100%;
            justify-content: center;
        }

        .download-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 28px;
            padding: 50px 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            
            /* Strict alignment controls */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .download-card:hover {
            border-color: rgba(94, 92, 230, 0.3);
            background: rgba(255, 255, 255, 0.02);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(94, 92, 230, 0.15);
        }

        /* --- Fluent Aesthetic Master Gradient --- */
        :root {
            /* Exact match to your image: pastel lavender -> vibrant purple -> rich royal blue */
            --fluent-gradient: linear-gradient(135deg, #e2b0ff 0%, #7633ff 40%, #0044ff 100%);
        }

        /* --- Logo Canvas Panels --- */
        .logo-canvas {
            width: 120px;
            height: 120px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.4s ease;
        }

        .download-card:hover .logo-canvas {
            transform: scale(1.06);
        }

        /* --- 1. Custom Fluent Windows Logo Structure --- */
        .windows-fluent-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 5px;
            width: 85px;
            height: 85px;
        }

        .win-pane {
            background: var(--fluent-gradient);
            background-attachment: local; /* Syncs gradient mapping across all 4 elements */
        }

        /* Rounds only the outer perimeter corners exactly like your image */
        .pane-tl { border-top-left-radius: 22px; }
        .pane-tr { border-top-right-radius: 22px; }
        .pane-bl { border-bottom-left-radius: 22px; }
        .pane-br { border-bottom-right-radius: 22px; }


        /* --- 2. Custom Fluent macOS Squircle Icon --- */
        .macos-fluent-squircle {
            width: 85px;
            height: 85px;
            background: var(--fluent-gradient);
            border-radius: 24px; /* Standard Apple app-icon squircle aspect */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .macos-fluent-squircle svg {
            width: 42px;
            height: 42px;
            fill: #05050a; /* Cuts out to reveal depth background */
            opacity: 0.85;
        }


        /* --- 3. Custom Fluent Linux Shield Icon --- */
        .linux-fluent-container {
            width: 85px;
            height: 85px;
            background: var(--fluent-gradient);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .linux-fluent-container svg {
            width: 45px;
            height: 45px;
            fill: #05050a;
            opacity: 0.85;
        }


        /* --- Typography & Buttons --- */
        .download-card h3 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .os-specs {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 35px;
        }

        .status-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            pointer-events: none;
            width: 100%;
            max-width: 220px;
            padding: 14px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.4s ease;
        }

        .download-card:hover .status-btn {
            border-color: rgba(94, 92, 230, 0.5);
            color: #ffffff;
            background: rgba(94, 92, 230, 0.2);
            box-shadow: 0 0 15px rgba(94, 92, 230, 0.2);
        }

        .status-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
    </style>
