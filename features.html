<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Client - Modules</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- Premium Black & Gold Theme Overrides --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
        }

        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(20, 20, 25, 1) 0%, #050505 100%);
            color: #f4f4f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Celestial Starfield Background --- */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 75px 130px, rgba(212, 175, 55, 0.6), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 150px 60px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 220px 190px, rgba(212, 175, 55, 0.8), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 300px 40px, #fff, rgba(0,0,0,0));
            background-size: 400px 400px;
            opacity: 0.35;
        }

        .wrapper {
            width: 100%;
            max-width: 1200px;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        /* --- Video-Style Celestial Header --- */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
            text-align: center;
        }

        .moon-icon {
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));
            margin-bottom: 20px;
            animation: moonFloat 4s ease-in-out infinite;
        }

        @keyframes moonFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .brand-title {
            font-size: 2.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff 40%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-subtitle {
            font-size: 1rem;
            color: #d4af37;
            font-weight: 700;
            margin-top: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        /* --- Glassmorphism Modules Grid --- */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            width: 100%;
            margin-bottom: 50px;
        }

        /* --- Black & Gold Glass Cards --- */
        .mod-card {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(212, 175, 55, 0.12);
            border-radius: 16px;
            padding: 24px;
            text-align: left;
            transition: all 0.25s ease;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .mod-card:hover {
            transform: translateY(-3px);
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.1);
            background: rgba(15, 15, 15, 0.85);
        }

        .mod-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mod-title::before {
            content: "✦";
            color: #d4af37;
            font-size: 0.9rem;
        }

        .mod-desc {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.5;
        }

        /* --- Navigation Link Style From Video --- */
        .back-link {
            display: inline-block;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: color 0.2s, text-shadow 0.2s;
            font-weight: 600;
            z-index: 10;
        }

        .back-link:hover {
            color: #d4af37;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        /* --- Footer --- */
        footer {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
        }

        .credit-title {
            font-size: 0.75rem;
            color: rgba(212, 175, 55, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .owner-block {
            margin-bottom: 12px;
        }

        .owner-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .owner-label {
            font-size: 0.75rem;
            color: #d4af37;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 2px;
        }

        .tester-block {
            margin-top: 15px;
            background: rgba(212, 175, 55, 0.03);
            border: 1px dashed rgba(212, 175, 55, 0.15);
            padding: 10px;
            border-radius: 10px;
        }

        .tester-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .tester-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="starfield"></div>

    <div class="wrapper">
        <header>
            <div class="moon-icon">
                <svg width="55" height="55" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 3C10.5 5.5 10.5 9.5 13 12C15.5 14.5 19.5 14.5 22 13C21 17 18 20 13.5 20.5C8.5 21 4 17 3.5 11.5C3 6.5 7.5 3.5 12 3Z" fill="#d4af37" stroke="#fce083" stroke-width="1" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="brand-title">Midnight Modules</div>
            <div class="brand-subtitle">150+ Premium Features Inside</div>
        </header>

        <main class="modules-grid" id="features-container"></main>

        <a href="index.html" class="back-link">← Back to home</a>

        <footer>
            <div class="credit-title">Development Credits</div>
            <div class="owner-block">
                <div class="owner-name">ItzVec</div>
                <div class="owner-label">Founder & Lead Developer</div>
            </div>
            <div class="tester-block">
                <div class="tester-name">phidol domond</div>
                <div class="tester-label">First Early Access Partner</div>
            </div>
        </footer>
    </div>

    <script>
        const cleanModules = [
            { name: "Keystrokes Overlay", desc: "Displays fully customizable WASD rendering metrics and direct active mouse clicks on screen." },
            { name: "CPS Tracker", desc: "Monitors real-time right and left click speeds cleanly aligned inside your custom HUD configuration." },
            { name: "FPS Indicator", desc: "Sleek, lightweight performance rendering module tracking frames per second dynamically." },
            { name: "Cinematic Motion Blur", desc: "Implements high-fidelity accumulation screen blending routines for ultimate visual fluidity." },
            { name: "ToggleSprint Engine", desc: "Allows toggle-locking sprint and sneak functionalities perfectly without repetitive holding down." },
            { name: "Armor Status Matrix", desc: "Keeps real-time tracking data on armor durability levels, displaying clean active element graphics." },
            { name: "Item Physics Patch", desc: "Gives items dropped on the ground flat, realistic 3D rotational spatial physics rendering behaviors." },
            { name: "Smooth Zoom Customizer", desc: "Scroll-controlled camera zooming mechanics supporting smooth variable field-of-view changes." },
            { name: "Directional Compass HUD", desc: "A luxury navigation bar showing exact cardinal headings and dynamic target bearings." },
            { name: "Waypoint Beam Marker", desc: "Save coordinate points and beam high-visibility light pillars straight into the sky grid." },
            { name: "Crosshair Designer", desc: "Complete custom vector crosshair system built with absolute color and layout variables." },
            { name: "Client-Side Time Changer", desc: "Freeze, shift, or manipulate your client world clock rendering independently of host servers." },
            { name: "Scoreboard Customizer", desc: "Rescale, text-tint, reposition, or hide sidebar statistics display frameworks safely." },
            { name: "Melee Reach Display", desc: "Measures and overlays exact block hitting registration metrics instantly during contact." },
            { name: "PvP Combo Tracker", desc: "Accurately registers and counts consecutive successful attacks landed on targeted enemies." },
            { name: "Block Outline Enhancer", desc: "Modify vector colors, width values, and shading patterns of active selection lines." },
            { name: "Active Status Monitor", desc: "Displays current potion effects, detailed countdown timelines, and high-res icon matrices." },
            { name: "Dynamic Ping Monitor", desc: "Tracks round-trip latency data streams natively directly to avoid network anomalies." },
            { name: "Advanced Chat Multiplier", desc: "Adds smooth custom line spacing, complete background shading controls, and limitless history logs." },
            { name: "Automated Arena Honors", desc: "Instantly delivers structured sportsmanlike sports messages to match chat rooms dynamically." },
            { name: "Streamer Name Mask", desc: "Anonymizes your screen identity patterns locally to defeat targeting vulnerabilities live." },
            { name: "TNT Fuse Countdown", desc: "Displays precision ignition ticks right over primed explosive entities cleanly." },
            { name: "Smooth Chunk Animator", desc: "Forces newly loaded chunks to smoothly morph up from the horizon line seamlessly." },
            { name: "Crystal Clear Water", desc: "Strips out dark underwater visibility fog bounds to maximize diving field visibility paths." },
            { name: "360° Freelook Camera", desc: "Detach camera tracking systems to survey your surroundings completely without shifting rotation." },
            { name: "Particle Density Booster", desc: "Optimizes critical hit particle rendering limits to enhance combat verification visual fields." },
            { name: "Smart Memory Recycler", desc: "Periodically cleans up runtime garbage collection caches to stabilize frame-times during map swaps." },
            { name: "Hurt Cam Stabilizer", desc: "Adjusts or completely eliminates structural camera tilt shakes during incoming attack states." },
            { name: "Dynamic Fullbright Patch", desc: "Illuminates dark caves and structural grid pathways perfectly with zero performance degradation." },
            { name: "Bossbar Position Modifier", desc: "Enables scaling and drag-and-drop structural movement mechanics for world boss meters." },
            { name: "Dropped Item Tracker", desc: "Draws elegant, translucent glow vectors around dropped assets on the map field." },
            { name: "Compact Coordinates HUD", desc: "Displays absolute X, Y, Z positioning points elegantly using reduced visual footprints." },
            { name: "Enchantment Glint Editor", desc: "Take charge of glowing weapon layers, customizing speeds and hue spectrum curves." },
            { name: "Floating Inventory HUD", desc: "Renders miniature interactive mirrors of your active bag layers directly to your view panel." },
            { name: "Adaptive FOV Engine", desc: "Intelligently compensates for swift sprinting velocity speeds to maintain aiming consistency." },
            { name: "Level Head Analytics", desc: "Gathers and displays net network levels over nearby entities on compatible servers." },
            { name: "Clean Tab-List Overlay", desc: "Re-architects multiplayer listings using compact formats and customizable grid styles." },
            { name: "Network Packet Shield", desc: "Buffers data stream exchanges safely to optimize network responsiveness during stress scenarios." },
            { name: "Local Weather Changer", desc: "Instantly force clear blue skies, rainy weather states, or snowfall visuals client-side." },
            { name: "Screen Title Controller", desc: "Allows moving or completely diminishing large server announcement overlays from center view." },
            { name: "Entity Hitbox Visualizer", desc: "Renders precise mathematical collision boxes around targets for perfect aim accuracy testing." },
            { name: "Damage Tilt Stabilizer", desc: "Calibrates vector direction indicators to keep camera focal points steady under pressure." },
            { name: "Cosmetics & Cloaks Manager", desc: "Allows full client-side attachment mapping setups for celestial wings and premium wraps." },
            { name: "Skin Blinker Synchronization", desc: "Automates skin outer layers to cycle animations evenly in perfect timing loops." },
            { name: "Server Connection Monitor", desc: "Outputs minor uptime alert statistics directly to your notification array." },
            { name: "Attack Cooldown Indicator", desc: "Presents precision swing reset timelines right inside your reticle view center." },
            { name: "Cross-Server Quick Chat", desc: "Binds macro communication pathways to private channels across instances smoothly." },
            { name: "Low-Fire Optimization Patch", desc: "Lowers screen-space ignition block visuals significantly to ensure full line of sight." },
            { name: "Dynamic Reticle Scaling", desc: "Transforms reticle scaling properties dynamically based on movement speeds to maintain center alignment." },
            { name: "Celestial Performance Core", desc: "Overhauls rendering pipelines to guarantee maximum frames inside demanding environments." }
        ];

        const targetGrid = document.getElementById('features-container');

        // Loop renders exactly all 50 items instantly without filters
        cleanModules.forEach(mod => {
            const card = document.createElement('div');
            card.className = 'mod-card';
            card.innerHTML = `
                <div class="mod-title">${mod.name}</div>
                <div class="mod-desc">${mod.desc}</div>
            `;
            targetGrid.appendChild(card);
        });
    </script>
</body>
</html>
